<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সবুজ পৃথিবী: বৃক্ষরোপণ অভিযান</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="presentation-wrapper">

    <div class="slide active" data-voice="বৃক্ষরোপণ আমাদের ভবিষ্যৎ। আসুন আমরা সবাই মিলে একটি সবুজ পৃথিবী গড়ে তুলি।">
        <div class="content">
            <h1>বৃক্ষরোপণ: আমাদের ভবিষ্যৎ</h1>
            <p>একটি চারা গাছ, একটি নতুন প্রাণ</p>
        </div>
    </div>

    <div class="slide" data-voice="জলবায়ু পরিবর্তন রোধে গাছ গুরুত্বপূর্ণ ভূমিকা রাখে।">
        <div class="content">
            <h2>জলবায়ু পরিবর্তন</h2>
            <p>গাছ পৃথিবীকে শীতল রাখে ও কার্বন শোষণ করে।</p>
        </div>
    </div>

    <div class="slide" data-voice="একটি বড় গাছ প্রতিদিন বহু মানুষের অক্সিজেন সরবরাহ করে।">
        <div class="content">
            <h2>অক্সিজেন</h2>
            <p>গাছ আমাদের জীবনের প্রধান ভিত্তি।</p>
        </div>
    </div>

    <div class="slide" data-voice="আমরা সবাই প্রতিদিন অন্তত একটি করে গাছ লাগানোর শপথ নেই।">
        <div class="content">
            <h2>শপথ</h2>
            <p>সবুজ পৃথিবীর জন্য একসাথে কাজ করি।</p>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">পেছনে</button>
        <button id="voiceBtn">🔊 ভয়েস</button>
        <button id="nextBtn">সামনে</button>
    </div>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
